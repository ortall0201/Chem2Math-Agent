name: Codex Trigger Signal

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

permissions:
  pull-requests: write
  contents: read

jobs:
  codex-task-ready-signal:
    if: contains(github.event.pull_request.labels.*.name, 'codex-implement')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Detect task contract file
        id: task
        shell: bash
        run: |
          if [ -f "workflow/current_task.md" ]; then
            echo "task_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "task_present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post or update codex pickup signal comment
        if: steps.task.outputs.task_present == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "codex-task-ready: true";
            const pr = context.payload.pull_request;
            const body = [
              "<!-- codex-task-ready-signal -->",
              "```yaml",
              `${marker}`,
              `pr_number: ${pr.number}`,
              `head_sha: ${pr.head.sha}`,
              `branch: ${pr.head.ref}`,
              "task_contract_path: workflow/current_task.md",
              "note: pickup signal only, not execution",
              "```",
            ].join("\n");

            const {data: comments} = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existing = comments.find((c) =>
              c.user?.type === "Bot" &&
              typeof c.body === "string" &&
              c.body.includes("<!-- codex-task-ready-signal -->")
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
